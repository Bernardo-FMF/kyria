<svg width="720" height="470" viewBox="0 0 720 470" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Consistent-hash ring placement</title>
  <desc>Virtual nodes from three physical nodes are interleaved around a hash ring. A key hashes to a position; walking clockwise collects the first three distinct physical nodes as its replica set.</desc>
  <style>
    :root{--ink:#24292f;--muted:#57606a;--line:#d0d7de;--surface:#f6f8fa;--accent:#0969da;--soft:#ddf4ff;}
    @media (prefers-color-scheme:dark){:root{--ink:#e6edf3;--muted:#8b949e;--line:#30363d;--surface:#161b22;--accent:#58a6ff;--soft:#12283f;}}
    text{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;fill:var(--ink);}
    .m{fill:var(--muted);}
    .box{fill:var(--surface);stroke:var(--line);stroke-width:1.5;}
    .vn{fill:var(--surface);stroke:var(--muted);stroke-width:1.5;}
    .sel{fill:var(--soft);stroke:var(--accent);stroke-width:2.5;}
  </style>
  <defs>
    <marker id="aw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <circle cx="240" cy="240" r="150" fill="none" stroke="var(--line)" stroke-width="1.5"/>

  <circle class="vn" cx="278.8" cy="95.1" r="8"/><text class="m" x="284" y="80" text-anchor="middle" font-size="12">n1</text>
  <circle class="vn" cx="336.4" cy="125.1" r="8"/><text class="m" x="352" y="116" text-anchor="middle" font-size="12">n3</text>
  <circle class="sel" cx="376.0" cy="176.6" r="9"/><text x="402" y="172" text-anchor="middle" font-size="12" fill="var(--accent)">n2</text>
  <circle class="sel" cx="389.4" cy="253.1" r="9"/><text x="416" y="258" text-anchor="middle" font-size="12" fill="var(--accent)">n1</text>
  <circle class="vn" cx="369.9" cy="315.0" r="8"/><text class="m" x="392" y="330" text-anchor="middle" font-size="12">n3</text>
  <circle class="sel" cx="315.0" cy="369.9" r="9"/><text x="326" y="392" text-anchor="middle" font-size="12" fill="var(--accent)">n3</text>
  <circle class="vn" cx="253.1" cy="389.4" r="8"/><text class="m" x="255" y="414" text-anchor="middle" font-size="12">n2</text>
  <circle class="vn" cx="188.7" cy="381.0" r="8"/><text class="m" x="181" y="405" text-anchor="middle" font-size="12">n1</text>
  <circle class="vn" cx="133.9" cy="346.1" r="8"/><text class="m" x="116" y="364" text-anchor="middle" font-size="12">n3</text>
  <circle class="vn" cx="99.0" cy="291.3" r="8"/><text class="m" x="76" y="302" text-anchor="middle" font-size="12">n2</text>
  <circle class="vn" cx="92.3" cy="214.0" r="8"/><text class="m" x="69" y="214" text-anchor="middle" font-size="12">n1</text>
  <circle class="vn" cx="125.1" cy="143.6" r="8"/><text class="m" x="107" y="132" text-anchor="middle" font-size="12">n3</text>
  <circle class="vn" cx="176.6" cy="104.1" r="8"/><text class="m" x="167" y="89" text-anchor="middle" font-size="12">n2</text>

  <line x1="344.7" y1="151.3" x2="365.9" y2="134.2" stroke="var(--accent)" stroke-width="2"/>
  <text x="372" y="128" text-anchor="start" font-size="13" fill="var(--accent)">key user:1</text>

  <path d="M 388 116 A 200 200 0 0 1 330 407" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aw)"/>

  <text class="m" x="240" y="236" text-anchor="middle" font-size="13">the ring</text>
  <text class="m" x="240" y="254" text-anchor="middle" font-size="12">3 nodes × 100 vnodes</text>

  <text x="486" y="150" text-anchor="start" font-size="14">replica set of 3</text>
  <rect class="sel" x="486" y="162" width="176" height="40" rx="6"/>
  <text x="500" y="179" text-anchor="start" font-size="14">kyria-2</text>
  <text class="m" x="500" y="195" text-anchor="start" font-size="12">primary · MOVED target</text>
  <rect class="box" x="486" y="210" width="176" height="34" rx="6"/>
  <text x="500" y="232" text-anchor="start" font-size="14">kyria-1</text>
  <rect class="box" x="486" y="252" width="176" height="34" rx="6"/>
  <text x="500" y="274" text-anchor="start" font-size="14">kyria-3</text>
  <text class="m" x="486" y="312" text-anchor="start" font-size="12">walk clockwise, take each</text>
  <text class="m" x="486" y="329" text-anchor="start" font-size="12">node once — repeat vnodes</text>
  <text class="m" x="486" y="346" text-anchor="start" font-size="12">are skipped, so N = N machines</text>

  <circle class="sel" cx="60" cy="446" r="7"/>
  <text class="m" x="74" y="450" text-anchor="start" font-size="12">selected into the replica set</text>
  <circle class="vn" cx="330" cy="446" r="7"/>
  <text class="m" x="344" y="450" text-anchor="start" font-size="12">other vnodes (nX = a vnode of node X)</text>
</svg>
