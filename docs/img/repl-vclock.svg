<svg width="720" height="300" viewBox="0 0 720 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vector clocks: siblings and convergence</title>
  <desc>Two writers start from the same version and write concurrently, producing incomparable clocks that are kept as siblings; a later write whose clock descends both collapses them back to a single value.</desc>
  <style>
    :root{--ink:#24292f;--muted:#57606a;--line:#d0d7de;--surface:#f6f8fa;--ok:#1a7f37;--oksoft:#dafbe1;--amber:#9a6700;--asoft:#fff8c5;}
    @media (prefers-color-scheme:dark){:root{--ink:#e6edf3;--muted:#8b949e;--line:#30363d;--surface:#161b22;--ok:#3fb950;--oksoft:#12261a;--amber:#d29922;--asoft:#2d2000;}}
    text{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;fill:var(--ink);}
    .m{fill:var(--muted);}
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}
    .box{fill:var(--surface);stroke:var(--line);stroke-width:1.5;}
    .sib{fill:var(--asoft);stroke:var(--amber);stroke-width:1.5;}
    .res{fill:var(--oksoft);stroke:var(--ok);stroke-width:1.5;}
    .e{stroke:var(--muted);stroke-width:1.6;fill:none;}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect class="box" x="24" y="116" width="146" height="58" rx="8"/>
  <text x="38" y="140" font-size="13">value: apple</text>
  <text class="m mono" x="38" y="159" font-size="12">clock {a:1}</text>

  <rect class="sib" x="268" y="34" width="164" height="58" rx="8"/>
  <text x="282" y="58" font-size="13">value: pear</text>
  <text class="m mono" x="282" y="77" font-size="12">{a:2} · by a</text>

  <rect class="sib" x="268" y="198" width="164" height="58" rx="8"/>
  <text x="282" y="222" font-size="13">value: plum</text>
  <text class="m mono" x="282" y="241" font-size="12">{a:1, b:1} · by b</text>

  <rect class="res" x="516" y="116" width="180" height="58" rx="8"/>
  <text x="530" y="140" font-size="13">value: fig</text>
  <text class="m mono" x="530" y="159" font-size="12">{a:3, b:1}</text>

  <path class="e" d="M170 134 C 220 100, 240 78, 266 66" marker-end="url(#a)"/>
  <path class="e" d="M170 156 C 220 190, 240 212, 266 224" marker-end="url(#a)"/>
  <path class="e" d="M432 66 C 470 90, 490 112, 514 132" marker-end="url(#a)"/>
  <path class="e" d="M432 224 C 470 200, 490 178, 514 158" marker-end="url(#a)"/>

  <text class="m" x="150" y="196" font-size="11">both start from {a:1}</text>
  <text x="350" y="130" text-anchor="middle" font-size="12" fill="var(--amber)">Compare → concurrent</text>
  <text class="m" x="350" y="148" text-anchor="middle" font-size="11">neither descends the other,</text>
  <text class="m" x="350" y="163" text-anchor="middle" font-size="11">so both are kept as siblings</text>
  <text class="m" x="566" y="196" font-size="11" text-anchor="middle">descends both → collapses</text>

  <text class="m" x="24" y="288" font-size="12">last-write-wins would silently drop one of pear / plum; vector clocks detect the conflict and keep both until a write resolves it</text>
</svg>
