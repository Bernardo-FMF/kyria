<svg width="720" height="316" viewBox="0 0 720 316" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Write path and the W quorum</title>
  <desc>The coordinator applies a write to its own store, counting as one ack, and fans the same version out to the other replicas; it replies once W acks land. An unreachable replica gets a hint parked for later, so the write does not block on it.</desc>
  <style>
    :root{--ink:#24292f;--muted:#57606a;--line:#d0d7de;--surface:#f6f8fa;--accent:#0969da;--soft:#ddf4ff;--ok:#1a7f37;--oksoft:#dafbe1;--danger:#cf222e;--amber:#9a6700;--asoft:#fff8c5;}
    @media (prefers-color-scheme:dark){:root{--ink:#e6edf3;--muted:#8b949e;--line:#30363d;--surface:#161b22;--accent:#58a6ff;--soft:#12283f;--ok:#3fb950;--oksoft:#12261a;--danger:#f85149;--amber:#d29922;--asoft:#2d2000;}}
    text{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;fill:var(--ink);}
    .m{fill:var(--muted);}
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}
    .box{fill:var(--surface);stroke:var(--line);stroke-width:1.5;}
    .prim{fill:var(--surface);stroke:var(--accent);stroke-width:2;}
    .inner{fill:var(--oksoft);stroke:var(--ok);stroke-width:1.3;}
    .badge{fill:var(--accent);}
  </style>
  <defs>
    <marker id="dk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="gn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="rd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--danger)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="bl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <rect class="box" x="20" y="128" width="112" height="56" rx="8" stroke-dasharray="5 4"/>
  <text class="mono" x="40" y="152" font-size="14">client</text>
  <text class="m" x="40" y="170" font-size="11">SET foo bar</text>

  <rect class="prim" x="206" y="92" width="214" height="150" rx="9"/>
  <circle cx="224" cy="116" r="5" fill="var(--accent)"/>
  <text class="mono" x="236" y="120" font-size="14">kyria-1</text>
  <text class="m" x="236" y="137" font-size="11">coordinator · owns "foo"</text>
  <rect class="inner" x="224" y="150" width="178" height="46" rx="7"/>
  <text x="238" y="170" font-size="12">local store</text>
  <text class="m mono" x="238" y="187" font-size="11">apply → ack 1 / 2</text>
  <text x="315" y="222" text-anchor="middle" font-size="12" fill="var(--ok)">W = 2 met ✓</text>

  <rect class="box" x="504" y="78" width="176" height="52" rx="8"/>
  <circle cx="522" cy="98" r="5" fill="var(--ok)"/>
  <text class="mono" x="534" y="102" font-size="14">kyria-2</text>
  <text class="m" x="522" y="120" font-size="11">replica · applies → ack 2 / 2</text>

  <rect class="box" x="504" y="206" width="176" height="52" rx="8" stroke-dasharray="5 4"/>
  <circle cx="522" cy="226" r="5" fill="var(--danger)"/>
  <text class="mono" x="534" y="230" font-size="14">kyria-3</text>
  <text class="m" x="522" y="248" font-size="11">unreachable</text>

  <path d="M134 150 L202 130" fill="none" stroke="var(--ink)" stroke-width="1.8" marker-end="url(#dk)"/>
  <circle class="badge" cx="168" cy="132" r="10"/><text x="168" y="136" text-anchor="middle" font-size="11" fill="#fff">1</text>

  <path d="M420 130 L500 104" fill="none" stroke="var(--ok)" stroke-width="1.8" marker-end="url(#gn)"/>
  <circle cx="460" cy="110" r="10" fill="var(--ok)"/><text x="460" y="114" text-anchor="middle" font-size="11" fill="#fff">2</text>
  <text class="mono" x="430" y="150" font-size="11" fill="var(--ok)">RSET</text>

  <path d="M420 204 L500 230" fill="none" stroke="var(--danger)" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#rd)"/>
  <circle cx="460" cy="222" r="10" fill="var(--danger)"/><text x="460" y="226" text-anchor="middle" font-size="11" fill="#fff">3</text>
  <text class="mono" x="428" y="200" font-size="11" fill="var(--danger)">RSET fails</text>

  <path d="M300 242 C 250 288, 150 272, 92 186" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-dasharray="2 4" marker-end="url(#bl)"/>
  <circle class="badge" cx="210" cy="282" r="10"/><text x="210" y="286" text-anchor="middle" font-size="11" fill="#fff">4</text>
  <text class="mono" x="228" y="286" font-size="12" fill="var(--accent)">+OK</text>

  <text class="m" x="504" y="284" font-size="11">kyria-3 gets a hint, parked and</text>
  <text class="m" x="504" y="300" font-size="11">replayed later — the write never waits on it</text>
</svg>
