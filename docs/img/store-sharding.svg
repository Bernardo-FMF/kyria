<svg width="720" height="380" viewBox="0 0 720 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Lock-striped sharding</title>
  <desc>A key is hashed to one of four shards; only that shard's lock is taken, leaving the other three open to other keys.</desc>
  <style>
    :root{--ink:#24292f;--muted:#57606a;--line:#d0d7de;--surface:#f6f8fa;--accent:#0969da;--soft:#ddf4ff;}
    @media (prefers-color-scheme:dark){:root{--ink:#e6edf3;--muted:#8b949e;--line:#30363d;--surface:#161b22;--accent:#58a6ff;--soft:#12283f;}}
    text{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;fill:var(--ink);}
    .m{fill:var(--muted);}
    .box{fill:var(--surface);stroke:var(--line);stroke-width:1.5;}
    .hl{fill:var(--soft);stroke:var(--accent);stroke-width:2;}
    .ln{stroke:var(--line);stroke-width:1.5;fill:none;}
    .lna{stroke:var(--accent);stroke-width:2;fill:none;}
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="box" x="290" y="24" width="140" height="46" rx="8"/>
  <text x="360" y="52" text-anchor="middle" font-size="15">SET user:42</text>

  <line class="ln" x1="360" y1="70" x2="360" y2="92" marker-end="url(#a)"/>

  <rect class="box" x="252" y="94" width="216" height="54" rx="8"/>
  <text x="360" y="116" text-anchor="middle" font-size="14">shardFor("user:42")</text>
  <text x="360" y="136" text-anchor="middle" font-size="13" class="m">hash % 4  →  shard 1</text>

  <line class="ln" x1="330" y1="150" x2="110" y2="192" marker-end="url(#a)"/>
  <line class="lna" x1="352" y1="150" x2="272" y2="192" marker-end="url(#a)"/>
  <line class="ln" x1="368" y1="150" x2="448" y2="192" marker-end="url(#a)"/>
  <line class="ln" x1="390" y1="150" x2="610" y2="192" marker-end="url(#a)"/>

  <rect class="box" x="25" y="194" width="150" height="150" rx="8"/>
  <text x="40" y="220" font-size="14">shard 0</text>
  <rect x="112" y="206" width="20" height="15" rx="2" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <path d="M116 206 v-4 a6 6 0 0 1 12 0" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <rect x="40" y="238" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="50" y="253" font-size="12" class="m">cart:8</text>
  <rect x="40" y="268" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="50" y="283" font-size="12" class="m">sku:19</text>
  <text x="100" y="326" text-anchor="middle" font-size="12" class="m">open</text>

  <rect class="hl" x="195" y="194" width="150" height="150" rx="8"/>
  <text x="210" y="220" font-size="14">shard 1</text>
  <rect x="282" y="206" width="20" height="15" rx="2" fill="var(--accent)" stroke="var(--accent)" stroke-width="1.5"/>
  <path d="M286 206 v-6 a6 6 0 0 1 12 0 v6" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
  <rect x="210" y="238" width="120" height="22" rx="4" fill="none" stroke="var(--accent)"/>
  <text x="220" y="253" font-size="12">user:42</text>
  <rect x="210" y="268" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="220" y="283" font-size="12" class="m">order:3</text>
  <text x="270" y="326" text-anchor="middle" font-size="12" fill="var(--accent)">write lock held</text>

  <rect class="box" x="365" y="194" width="150" height="150" rx="8"/>
  <text x="380" y="220" font-size="14">shard 2</text>
  <rect x="452" y="206" width="20" height="15" rx="2" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <path d="M456 206 v-4 a6 6 0 0 1 12 0" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <rect x="380" y="238" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="390" y="253" font-size="12" class="m">tok:1</text>
  <rect x="380" y="268" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="390" y="283" font-size="12" class="m">sess:7</text>
  <text x="440" y="326" text-anchor="middle" font-size="12" class="m">open</text>

  <rect class="box" x="535" y="194" width="150" height="150" rx="8"/>
  <text x="550" y="220" font-size="14">shard 3</text>
  <rect x="622" y="206" width="20" height="15" rx="2" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <path d="M626 206 v-4 a6 6 0 0 1 12 0" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
  <rect x="550" y="238" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="560" y="253" font-size="12" class="m">img:4</text>
  <rect x="550" y="268" width="120" height="22" rx="4" fill="none" stroke="var(--line)"/>
  <text x="560" y="283" font-size="12" class="m">key:22</text>
  <text x="610" y="326" text-anchor="middle" font-size="12" class="m">open</text>

  <text x="360" y="366" text-anchor="middle" font-size="13" class="m">a write locks shard 1 while shards 0, 2 and 3 stay open to other keys</text>
</svg>
